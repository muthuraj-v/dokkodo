<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>独行道 — Dokkodo | Zen Paper</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600;700&family=Noto+Serif+JP:wght@200;300;400;500&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --paper: #faf8f2; --ink: #262420; --ink-soft: #8a8378; --line: rgba(38,36,32,0.12); --accent: #3d3a34;
  }
  *{ box-sizing: border-box; }
  html,body{ margin:0; padding:0; height:100%; height:100dvh; background: var(--paper); color: var(--ink);
    font-family:'Noto Serif JP', serif; overflow:hidden; }
  .stage{ position:relative; width:100%; height:100vh; height:100dvh; display:flex; align-items:center; justify-content:center; }
  .topbar{ position:fixed; top:0; left:0; right:0; z-index:20; padding:30px 44px 0 44px;
    display:flex; justify-content:space-between; align-items:flex-start; }
  .brand .jp{ font-family:'Shippori Mincho', serif; font-weight:500; font-size:16px; letter-spacing:0.2em; }
  .brand .en{ font-family:'Zen Kaku Gothic New', sans-serif; font-weight:300; font-size:9px;
    letter-spacing:0.3em; color: var(--ink-soft); text-transform:uppercase; margin-top:3px; }
  .clock{ text-align:right; font-family:'Zen Kaku Gothic New', sans-serif; color: var(--ink-soft); }
  .clock .today{ font-size:10px; letter-spacing:0.18em; text-transform:uppercase; }
  .clock .now{ font-size:12px; letter-spacing:0.08em; margin-top:2px; color: var(--ink); }
  .progress-track{ position:fixed; top:0; left:0; right:0; height:1px; z-index:30; background: var(--line); }
  .progress-fill{ height:100%; width:0%; background: var(--ink); }
  .rail{ position:fixed; bottom:34px; left:0; right:0; z-index:20; display:flex; justify-content:center; align-items:center; gap:8px; }
  .tick{ width:4px; height:4px; border-radius:50%; background: var(--line); cursor:pointer; transition: all .35s ease; }
  .tick.active{ background: var(--ink); width:14px; border-radius:2px; }
  .nav-zone{ position:fixed; top:0; bottom:0; width:18%; z-index:15; cursor:pointer; }
  .nav-zone.left{ left:0; } .nav-zone.right{ right:0; }
  .arrow{ display:none; }
  .panel{ position:relative; width:min(560px,80vw); padding: 0 0 0 0; text-align:center; }
  .index-line{ font-family:'Zen Kaku Gothic New', sans-serif; font-weight:400; font-size:11px;
    letter-spacing:0.3em; color: var(--ink-soft); text-transform:uppercase; margin-bottom:38px;
    display:flex; align-items:center; justify-content:center; gap:14px; }
  .index-line::before, .index-line::after{ content:""; width:36px; height:1px; background: var(--line); }
  .precept-jp{ font-family:'Shippori Mincho', serif; font-weight:600; font-size:clamp(24px,3.4vw,32px);
    line-height:1.6; margin:0 0 20px 0; letter-spacing:0.02em; }
  .precept-en{ font-family:'Shippori Mincho', serif; font-weight:400; font-style:italic;
    font-size:clamp(15px,1.7vw,18px); color: var(--accent); line-height:1.6; margin:0; }
  .divider{ width:1px; height:26px; background: var(--line); margin:26px auto; }
  .precept-explain{ font-family:'Zen Kaku Gothic New', sans-serif; font-weight:300; font-size:clamp(12px,1.2vw,13.5px);
    color: var(--ink-soft); line-height:1.85; margin:0 auto; max-width:400px; }
  .fade-in{ animation: fadeUp .8s ease forwards; }
  @keyframes fadeUp{ from{opacity:0;transform:translateY(8px);} to{opacity:1;transform:translateY(0);} }
  .controls{ position:fixed; bottom:34px; right:44px; z-index:25; display:flex; align-items:center; gap:12px; }
  .iconbtn{ width:26px; height:26px; border-radius:50%; border:1px solid var(--line); background:transparent;
    color: var(--ink-soft); cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:11px;
    font-family:'Zen Kaku Gothic New', sans-serif; transition: all .25s ease; }
  .iconbtn:hover{ border-color: var(--ink); color: var(--ink); }
  .iconbtn.active{ background: var(--ink); border-color: var(--ink); color: var(--paper); }
  @media (max-width:640px){
    .nav-zone{ width:24%; }
    .topbar{ padding:16px 18px 0 18px; }
    .brand .jp{ font-size:14px; }
    .brand .en{ font-size:8px; letter-spacing:0.22em; }
    .clock .today{ font-size:9px; }
    .clock .now{ font-size:11px; }
    .panel{ width:88vw; max-height:78vh; max-height:78dvh; overflow-y:auto; -webkit-overflow-scrolling:touch; }
    .index-line{ margin-bottom:24px; }
    .index-line::before, .index-line::after{ width:22px; }
    .precept-jp{ font-size:20px; margin-bottom:14px; }
    .precept-en{ font-size:14px; }
    .divider{ margin:18px auto; }
    .precept-explain{ max-width:94%; font-size:12px; }
    .rail{ bottom: calc(12px + env(safe-area-inset-bottom)); gap:5px; flex-wrap:wrap; max-width:78vw; margin:0 auto; left:0; right:0; }
    .tick{ width:3.5px; height:3.5px; }
    .tick.active{ width:12px; }
    .controls{ bottom: calc(50px + env(safe-area-inset-bottom)); right:16px; gap:8px; }
    .iconbtn{ width:36px; height:36px; font-size:12px; }
  }
  @media (max-width:380px){
    .precept-jp{ font-size:18px; }
  }
  @media (prefers-reduced-motion: reduce){ .fade-in{ animation:none !important; } }
</style>
</head>
<body>
<div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
<div class="topbar">
  <div class="brand"><div class="jp">獨行道</div><div class="en">Dokkodo · Twenty-One Precepts</div></div>
  <div class="clock"><div class="today" id="todayDate"></div><div class="now" id="nowTime"></div></div>
</div>
<div class="stage">
  <div class="nav-zone left" id="zoneLeft"></div>
  <div class="nav-zone right" id="zoneRight"></div>
  <div class="panel">
    <div class="index-line" id="countTag"></div>
    <div class="content" id="content">
      <div class="precept-jp" id="jpText"></div>
      <div class="precept-en" id="enText"></div>
      <div class="divider"></div>
      <div class="precept-explain" id="explainText"></div>
    </div>
  </div>
</div>
<div class="rail" id="rail"></div>
<div class="controls">
  <button class="iconbtn" id="speakBtn" title="read aloud">🔊</button>
  <button class="iconbtn" id="playBtn" title="pause">❚❚</button>
</div>
<script src="dokkodo-core.js"></script>
</body>
</html>
